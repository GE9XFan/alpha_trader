order_types:
  default: LIMIT
  allowed_types:
  - LIMIT
  - MARKET
  - STOP
  - STOP_LIMIT
  entry_orders:
    type: LIMIT
    time_in_force: DAY
    price_adjustment: 0.02
    max_chase_ticks: 3
    cancel_after_seconds: 30
  exit_orders:
    take_profit:
      type: LIMIT
      time_in_force: GTC
    stop_loss:
      type: STOP
      time_in_force: GTC
      trail_amount: null
    emergency_exit:
      type: MARKET
      time_in_force: IOC
  smart_routing:
    enabled: true
    destination: SMART
