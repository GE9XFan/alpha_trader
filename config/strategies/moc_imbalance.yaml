strategy:
  name: MOC Imbalance Strategy
  enabled: true
  description: Trades based on market-on-close imbalances
confidence:
  minimum: 0.7
  imbalance_weight: 0.5
  technical_weight: 0.3
  ml_weight: 0.2
timing:
  active_window:
    start: '15:40'
    end: '15:55'
  decision_deadline: '15:50'
  execution_window:
    start: '15:50'
    end: '15:55'
thresholds:
  min_imbalance: 10000000
  min_normalized_imbalance: 0.1
  min_iv: 0.15
  max_spread: 0.05
execution:
  use_straddle:
    when_iv_below: 0.2
    max_premium: 5.0
  use_directional:
    when_iv_above: 0.2
    follow_imbalance: true
