alerts:
  channels:
    discord:
      enabled: true
      priority_levels:
      - INFO
      - WARNING
      - CRITICAL
      - EMERGENCY
    email:
      enabled: false
      priority_levels:
      - CRITICAL
      - EMERGENCY
    sms:
      enabled: false
      priority_levels:
      - EMERGENCY
  types:
    trade_executed:
      enabled: true
      level: INFO
    stop_loss_triggered:
      enabled: true
      level: WARNING
    circuit_breaker_triggered:
      enabled: true
      level: CRITICAL
    system_error:
      enabled: true
      level: CRITICAL
    api_rate_limit_warning:
      enabled: true
      level: WARNING
      threshold: 450
    daily_loss_limit:
      enabled: true
      level: CRITICAL
  rate_limiting:
    max_per_minute: 10
    group_similar: true
    group_window_seconds: 60
