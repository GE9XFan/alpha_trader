# Testing Configuration for AlphaTrader
# This configuration is for automated testing

mode: testing
environment: testing

# IBKR Settings - Mock/test account
ibkr:
  account: TEST123456
  host: 127.0.0.1
  live_port: 7496
  paper_port: 7497
  client_id: 99  # Different client ID for tests
  timeout: 5  # Shorter timeout for tests
  heartbeat_interval: 30
  max_reconnect_attempts: 2  # Fewer retries in tests

# Alpha Vantage Settings
alpha_vantage:
  api_key: test_api_key_123
  rate_limit: 100  # Lower rate limit for tests
  timeout: 5
  retry_count: 1
  critical_update_interval: 60
  standard_update_interval: 600

# Greeks Limits - Tight limits for testing
greeks_limits:
  delta_min: -0.2
  delta_max: 0.2
  gamma_min: -0.5
  gamma_max: 0.5
  vega_min: -500.0
  vega_max: 500.0
  theta_min: -300.0
  rho_min: -500.0
  rho_max: 500.0

# Risk Limits - Very conservative for testing
risk_limits:
  max_positions: 5
  max_position_size: 1000.0
  daily_loss_limit: 100.0
  vpin_threshold: 0.5
  max_leverage: 1.0
  stop_loss_percentage: 0.01

# Community Settings - Disabled for testing
community:
  discord_token: null
  discord_webhook_url: null
  whop_api_key: null
  broadcast_delay_free: 0
  broadcast_delay_premium: 0
  broadcast_delay_vip: 0
  max_daily_signals_free: 100
  max_daily_signals_premium: 100
  max_daily_signals_vip: -1

# Trading Symbols - Minimal for testing
symbols:
  - SPY
  - AAPL
  - TEST

# Database Configuration - Test database
database_url: postgresql://localhost/alphatrader_test
redis_url: redis://localhost:6379/15

# Logging
log_level: DEBUG
log_dir: logs/test

# Performance Settings
enable_profiling: false
enable_metrics: false
metrics_port: 8082