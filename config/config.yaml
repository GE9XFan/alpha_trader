# Options Trading System Configuration
# Phase 1: Core Infrastructure

# System Configuration
system:
  name: "Options Trading System"
  version: "1.0.0"
  environment: ${ENVIRONMENT:development}
  debug: ${DEBUG:True}

# Cache Configuration (Redis)
cache:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  db: ${REDIS_DB:0}
  password: ${REDIS_PASSWORD:}
  
  # Memory Configuration
  max_memory: ${REDIS_MAX_MEMORY:4gb}
  max_memory_policy: volatile-lru
  
  # Connection Pool
  max_connections: 100
  socket_keepalive: true
  socket_connect_timeout: 5
  
  # TTL Strategy (seconds)
  ttl:
    # Ultra-short (microstructure)
    order_book: 1
    trades: 1
    vpin: 1
    
    # Short (options)
    options_chain: 10
    greeks: 10
    calculated_metrics: 5
    
    # Medium (indicators)
    technical_indicators: 60
    analytics: 120
    
    # Long (slow-changing)
    sentiment: 300
    fundamentals: 3600

# IBKR Configuration
ibkr:
  host: ${IBKR_HOST:127.0.0.1}
  port: ${IBKR_PORT:7497}  # 7497 paper, 7496 live
  client_id: ${IBKR_CLIENT_ID:1}
  account: ${IBKR_ACCOUNT:}
  
  # Connection Settings
  timeout: 10
  readonly: false
  
  # Market Data Subscriptions
  market_data:
    level2_depth: 10  # 10 levels each side
    use_smart_depth: false  # Disable SMART depth to prevent IndexError
    bar_size: "5 secs"
    what_to_show: "TRADES"
    use_rth: false  # FALSE for extended hours trading
  
  # Order Defaults
  order_defaults:
    algo_strategy: "Adaptive"
    algo_params:
      urgent: "Urgent"
      patient: "Patient"
    tif: "DAY"  # Time in force

# Alpha Vantage Configuration
alpha_vantage:
  api_key: ${AV_API_KEY:}
  base_url: ${AV_BASE_URL:https://www.alphavantage.co/query}
  rate_limit: ${AV_RATE_LIMIT:600}  # Premium: 600 calls/min
  
  # Request Configuration
  timeout: 10
  max_retries: 3
  retry_delay: 1
  
  # Endpoints to Use
  endpoints:
    - REALTIME_OPTIONS
    - HISTORICAL_OPTIONS
    - RSI
    - MACD
    - BBANDS
    - ATR
    - VWAP
    - NEWS_SENTIMENT
    - ANALYTICS_SLIDING_WINDOW
    - EARNINGS
    - OVERVIEW

# Trading Configuration
trading:
  mode: ${TRADING_MODE:paper}
  
  # Position Limits
  limits:
    max_positions: ${MAX_POSITIONS:5}
    max_position_size_pct: ${MAX_POSITION_SIZE_PCT:0.25}
    max_correlation: 0.70
    max_daily_loss: ${MAX_DAILY_LOSS:2000}
  
  # Risk Management
  risk:
    risk_per_trade: ${RISK_PER_TRADE:0.02}
    initial_stop_atr: 1.5
    trailing_stop_pct: 0.5
    
  # Targets (ATR multiples)
  targets:
    - 1.0
    - 2.0
    - 3.0
  
  scale_out_pcts:
    - 0.33
    - 0.50
    - 1.00
  
  # Circuit Breakers
  circuit_breakers:
    max_consecutive_losses: 3
    max_drawdown_pct: 0.02
    emergency_stop_all: true

# Signal Generation
signals:
  # Confidence Thresholds
  confidence_levels:
    no_trade: [0, 40]
    watch: [40, 60]
    standard: [60, 80]
    high_conviction: [80, 100]
  
  # Time Windows for Different Strategies
  strategies:
    "0DTE":
      start_time: "09:45"
      end_time: "15:00"
      min_confidence: 70
      
    "1DTE":
      start_time: "14:00"
      end_time: "15:30"
      min_confidence: 65
      
    "14DTE":
      start_time: "09:30"
      end_time: "16:00"
      min_confidence: 60
      
    "MOC":
      start_time: "15:30"
      end_time: "15:50"
      min_confidence: 75

# API Server
api:
  host: ${API_HOST:0.0.0.0}
  port: ${API_PORT:8000}
  ws_port: ${WS_PORT:8001}
  
  # CORS Settings
  cors:
    origins: ["*"]
    allow_credentials: true
    allow_methods: ["*"]
    allow_headers: ["*"]

# Dashboard
dashboard:
  host: ${DASHBOARD_HOST:localhost}
  port: ${DASHBOARD_PORT:8080}
  refresh_rate: 1000  # milliseconds
  
  # Panels to Display
  panels:
    - positions
    - market_data
    - pnl
    - risk
    - alerts
    - system_health

# Logging
logging:
  level: ${LOG_LEVEL:INFO}
  file: ${LOG_FILE:logs/trading.log}
  max_size: "100MB"
  backup_count: 10
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {name} | {message}"

# Monitoring
monitoring:
  prometheus_port: ${PROMETHEUS_PORT:9090}
  health_check_interval: 60  # seconds
  
  # Metrics to Track
  metrics:
    - latency_p50
    - latency_p99
    - error_rate
    - cache_hit_rate
    - signals_generated
    - positions_open
    - pnl_realized