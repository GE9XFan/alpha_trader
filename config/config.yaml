# Options Trading System Configuration
# Phase 1: Core Infrastructure

# System Configuration
system:
  name: "Options Trading System"
  version: "1.0.0"
  environment: ${ENVIRONMENT:development}
  debug: ${DEBUG:True}

# Cache Configuration (Redis)
cache:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  db: ${REDIS_DB:0}
  password: ${REDIS_PASSWORD:}

  # Memory Configuration
  max_memory: ${REDIS_MAX_MEMORY:4gb}
  max_memory_policy: volatile-lru

  # Connection Pool
  max_connections: 100
  socket_keepalive: true
  socket_connect_timeout: 5

  # TTL Strategy (seconds)
  ttl:
    # Ultra-short (microstructure)
    order_book: 60  # Increased from 10s to allow test completion
    trades: 30       # Increased for consistency
    vpin: 30         # Increased for VPIN calculations

    # Short (options)
    options_chain: 10
    greeks: 10
    calculated_metrics: 5

    # Medium (indicators)
    technical_indicators: 60
    analytics: 120

    # Long (slow-changing)
    sentiment: 300
    fundamentals: 3600

# IBKR Configuration
ibkr:
  host: ${IBKR_HOST:127.0.0.1}
  port: ${IBKR_PORT:7497}  # 7497 paper, 7496 live
  client_id: ${IBKR_CLIENT_ID:1}
  account: ${IBKR_ACCOUNT:}

  # Connection Settings
  timeout: 10
  readonly: false

  # Market Data Subscriptions
  market_data:
    level2_depth: 10  # 10 levels each side
    use_smart_depth: true  # Disable SMART depth to prevent IndexError
    bar_size: "5 secs"
    what_to_show: "TRADES"
    use_rth: false  # FALSE for extended hours trading

  # Order Defaults
  order_defaults:
    algo_strategy: "Adaptive"
    algo_params:
      urgent: "Urgent"
      patient: "Patient"
    tif: "DAY"  # Time in force

# Alpha Vantage Configuration
alpha_vantage:
  api_key: ${AV_API_KEY:}
  base_url: ${AV_BASE_URL:https://www.alphavantage.co/query}
  rate_limit: ${AV_RATE_LIMIT:600}  # Premium: 600 calls/min

  # Request Configuration
  timeout: 10
  max_retries: 3
  retry_delay: 1

  # Endpoints to Use
  endpoints:
    - REALTIME_OPTIONS
    - HISTORICAL_OPTIONS
    - RSI
    - MACD
    - BBANDS
    - ATR
    - VWAP
    - NEWS_SENTIMENT
    - ANALYTICS_SLIDING_WINDOW
    - EARNINGS
    - OVERVIEW

# Trading Configuration
trading:
  mode: ${TRADING_MODE:paper}

  # Position Limits
  limits:
    max_positions: ${MAX_POSITIONS:5}
    max_position_size_pct: ${MAX_POSITION_SIZE_PCT:0.25}
    max_correlation: 0.70
    max_daily_loss: ${MAX_DAILY_LOSS:2000}

  # Risk Management
  risk:
    risk_per_trade: ${RISK_PER_TRADE:0.02}
    initial_stop_atr: 1.5
    trailing_stop_pct: 0.5

  # Targets (ATR multiples)
  targets:
    - 1.0
    - 2.0
    - 3.0

  scale_out_pcts:
    - 0.33
    - 0.50
    - 1.00

  # Circuit Breakers
  circuit_breakers:
    max_consecutive_losses: 3
    max_drawdown_pct: 0.02
    emergency_stop_all: true

# Signal Generation
signals:
  # Confidence Thresholds
  confidence_levels:
    no_trade: [0, 40]
    watch: [40, 60]
    standard: [60, 80]
    high_conviction: [80, 100]

  # Time Windows for Different Strategies
  strategies:
    "0DTE":
      start_time: "09:45"
      end_time: "15:00"
      min_confidence: 70

    "1DTE":
      start_time: "14:00"
      end_time: "15:30"
      min_confidence: 65

    "14DTE":
      start_time: "09:30"
      end_time: "16:00"
      min_confidence: 60

    "MOC":
      start_time: "15:30"
      end_time: "15:50"
      min_confidence: 75

# API Server
api:
  host: ${API_HOST:0.0.0.0}
  port: ${API_PORT:8000}
  ws_port: ${WS_PORT:8001}

  # CORS Settings
  cors:
    origins: ["*"]
    allow_credentials: true
    allow_methods: ["*"]
    allow_headers: ["*"]

# Dashboard
dashboard:
  host: ${DASHBOARD_HOST:localhost}
  port: ${DASHBOARD_PORT:8080}
  refresh_rate: 1000  # milliseconds

  # Panels to Display
  panels:
    - positions
    - market_data
    - pnl
    - risk
    - alerts
    - system_health

# Logging
logging:
  level: ${LOG_LEVEL:INFO}
  file: ${LOG_FILE:logs/trading.log}
  max_size: "100MB"
  backup_count: 10
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {name} | {message}"

# Monitoring
monitoring:
  prometheus_port: ${PROMETHEUS_PORT:9090}
  health_check_interval: 60  # seconds

  # Metrics to Track
  metrics:
    - latency_p50
    - latency_p99
    - error_rate
    - cache_hit_rate
    - signals_generated
    - positions_open
    - pnl_realized

# Configuration-Driven Strategies
# These replace hardcoded strategies with discovered parameters
strategies:
  intraday_scalping:
    enabled: ${INTRADAY_ENABLED:false}
    time_window: "9:30-11:00"
    
    risk_limits:
      max_position_pct: ${INTRADAY_MAX_POS:0.05}  # 5% default
      max_loss_per_trade: ${INTRADAY_STOP:0.01}   # 1% stop
      max_daily_loss: ${INTRADAY_DAILY_LOSS:0.02} # 2% daily limit
      max_positions: ${INTRADAY_MAX_POSITIONS:3}
      
    data_requirements:
      min_trades: 100        # Minimum trades for VPIN calculation
      min_order_book_levels: 5
      lookback_bars: null    # To be discovered from YOUR data
      
  overnight_positioning:
    enabled: ${OVERNIGHT_ENABLED:false}
    time_window: "14:00-15:30"
    
    risk_limits:
      max_position_pct: ${OVERNIGHT_MAX_POS:0.10}
      max_loss_per_trade: ${OVERNIGHT_STOP:0.02}
      max_daily_loss: ${OVERNIGHT_DAILY_LOSS:0.03}
      max_positions: ${OVERNIGHT_MAX_POSITIONS:2}
      
    data_requirements:
      min_trades: 500
      min_order_book_levels: 5
      lookback_bars: null    # To be discovered
      
  position_trading:
    enabled: ${POSITION_ENABLED:true}  # Your default strategy
    time_window: "always"
    
    risk_limits:
      max_position_pct: ${POSITION_MAX_POS:0.15}
      max_loss_per_trade: ${POSITION_STOP:0.03}
      max_daily_loss: ${POSITION_DAILY_LOSS:0.05}
      max_positions: ${POSITION_MAX_POSITIONS:5}
      
    data_requirements:
      min_trades: 1000
      min_order_book_levels: 2
      lookback_bars: null    # To be discovered

# Risk Management Global Settings
risk_management:
  global:
    max_account_risk: ${MAX_ACCOUNT_RISK:0.06}  # 6% total risk
    max_correlation: ${MAX_CORRELATION:0.70}
    position_sizing_method: ${SIZING_METHOD:kelly_volatility}
    kelly_fraction: ${KELLY_FRACTION:0.25}  # Use 25% of full Kelly
    
  circuit_breakers:
    max_consecutive_losses: ${MAX_CONSECUTIVE_LOSSES:3}
    daily_loss_shutdown: ${DAILY_LOSS_SHUTDOWN:0.05}
    emergency_stop_all: ${EMERGENCY_STOP:true}
    
  var_limits:
    confidence_level: ${VAR_CONFIDENCE:0.95}
    max_var_1day: ${MAX_VAR_1D:0.04}
    max_var_5day: ${MAX_VAR_5D:0.08}

# Parameter Discovery Settings
discovered_parameters:
  vpin_bucket_size: ${DISCOVERED_VPIN_BUCKET:null}  # Discovered at runtime
  natural_timeframes: ${DISCOVERED_TIMEFRAMES:null}
  override_from_cache: true  # Use discovered values when available
  
  # Path to auto-generated parameters file
  discovered_file: "config/discovered.yaml"
  
  # Discovery settings
  discovery:
    min_trades_for_discovery: 10000
    min_bars_for_timeframe: 2000
    min_mm_events_for_analysis: 1000
    
# Market Maker Profiles (Will be populated by discovery)
market_makers:
  # These are discovered from YOUR Level 2 data
  # Example structure (populated after discovery):
  # IBEOS:
  #   name: "IB Smart Router"
  #   observed_frequency: 0.45
  #   avg_order_duration_ms: 12300
  #   toxicity: 0.15
  #   classification: "retail_flow"

# Analytics Configuration
analytics:
  # VPIN Configuration
  vpin:
    default_bucket_size: 100  # Default volume bucket size for VPIN
    trade_cache_size: 10000
    min_trades: 100
    activity_thresholds:
      high: 1000
      low: 200
    bulk_volume_classification: true  # Enable BV-VPIN per Easley 2012
    enable_discovery: true
    
  # Order Book Imbalance
  obi:
    imbalance_history_size: 1000
    pressure_history_size: 100
    normalization_factor: 100
    enable_vamp: true  # Volume Adjusted Mid Price
    vamp_levels: 5
    
  # GEX Configuration  
  gex:
    mm_hedge_ratio: 0.85
    pin_range_pct: 0.02
    high_gamma_threshold: 100
    distance_decay_factor: 50
    historical_iv_days: 252
    historical_sample_frequency: 7  # Weekly samples
    
  # Market Patterns
  market_patterns:
    retail_sizes: [100, 200, 300, 500]
    institutional_threshold: 1000
    odd_lot_threshold: 100
    round_sizes: [100, 200, 500, 1000]
    persistent_sizes: [100, 500, 1000]
    sweep_volume_threshold: 5000
    
  # Cache Limits
  cache_limits:
    gex_history: 500
    pin_history: 100
    bar_history: 1000
    iceberg_history: 100
    sweep_history: 100
    
  # Volatility
  volatility:
    trading_days: 252
    minutes_per_day: 390
    annualization_factor: 98280  # 252 * 390
    
  # Options Flow
  options_flow:
    volume_thresholds:
      sweep: 500
      block: 1000
      unusual_ratio: 2.0  # Volume/OI ratio for unusual activity
  
  # Options Configuration
  options:
    contract_multiplier: 100  # Standard equity option multiplier
    max_intensity: 100        # Maximum intensity cap
  
  # Spoofing Detection
  spoofing:
    concentration_threshold: 0.5     # Threshold for concentration detection
    concentration_penalty: 0.3       # Penalty score when threshold exceeded
    deep_order_multiplier: 3         # Multiplier for deep order size detection
    deep_order_penalty: 0.3          # Penalty for large deep orders
    imbalance_volatility_threshold: 0.3  # Threshold for imbalance volatility
    imbalance_volatility_penalty: 0.2    # Penalty for high imbalance volatility
    round_number_threshold: 6        # Threshold for round number detection
    round_number_penalty: 0.3        # Penalty for too many round numbers
    cliff_penalty: 0.2              # Penalty for cliff-like depth
    
  # Market Maker Profiles (Dynamic Discovery)
  market_makers:
    enable_discovery: true
    default_profiles:
      IBEOS:
        name: "IB Smart Router"
        toxicity_base: 0.15
      CDRG:
        name: "Citadel Securities"
        toxicity_base: 0.89
      OVERNIGHT:
        name: "Night Session Specialist"
        toxicity_base: 0.05
