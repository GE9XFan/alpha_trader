# Alpha Vantage API Configuration - Minimal for Phase 0
base_url: "https://www.alphavantage.co/query"
timeout: 30
retry_count: 3

# Rate limiting configuration
rate_limit:
  max_per_minute: 600
  target_per_minute: 500  # Stay below max
  refill_rate: 10  # tokens per second
  burst_capacity: 20

# Just REALTIME_OPTIONS for Phase 1
endpoints:
  realtime_options:
    function: "REALTIME_OPTIONS"
    datatype: "json"
    require_greeks: "true"
    cache_ttl: 30

  historical_options:
    function: "HISTORICAL_OPTIONS" 
    datatype: "json"
    cache_ttl: 86400
    

# Technical Indicators (Phase 5)
  rsi:
    function: "RSI"
    datatype: "json"
    cache_ttl: 60  # 60 seconds for fast indicators
    default_params:
      interval: "1min"
      time_period: 14
      series_type: "close"

  macd:
    function: "MACD"
    datatype: "json"
    cache_ttl: 60  # 60 seconds for fast indicators
    default_params:
      interval: "1min"
      fastperiod: 12
      slowperiod: 26
      signalperiod: 9
      series_type: "close"
  
  bbands:
    function: "BBANDS"
    datatype: "json"
    cache_ttl: 60  # 60 seconds for fast indicators
    default_params:
      interval: "5min"
      time_period: 20
      series_type: "close"
      nbdevup: 2
      nbdevdn: 2
      matype: 0  # 0=SMA
  
  vwap:
    function: "VWAP"
    cache_ttl: 60
    default_params:
      interval: "5min"
      datatype: "json"
      
  atr:
    function: "ATR"
    datatype: "json"
    cache_ttl: 300  # 5 minutes - longer TTL for daily data
    default_params:
      interval: "daily"  # ATR uses daily, not minute intervals
      time_period: 14  
  
  adx:
    function: "ADX"
    datatype: "json"
    cache_ttl: 300 
    default_params:
      interval: "5min"
      time_period: 14