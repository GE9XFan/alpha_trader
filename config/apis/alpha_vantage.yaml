alpha_vantage:
  api_key: ${AV_API_KEY}
  base_url: https://www.alphavantage.co/query
  timeout: 30
  max_retries: 3
  retry_delay: 1
  retry_backoff: 2
  endpoints:
    REALTIME_OPTIONS:
      cache_ttl: 10
      priority: 1
    HISTORICAL_OPTIONS:
      cache_ttl: 86400
      priority: 3
    RSI:
      cache_ttl: 60
      priority: 1
      default_params:
        interval: 5min
        time_period: 14
        series_type: close
    MACD:
      cache_ttl: 60
      priority: 1
      default_params:
        interval: 5min
        series_type: close
        fastperiod: 12
        slowperiod: 26
        signalperiod: 9
    BBANDS:
      cache_ttl: 60
      priority: 1
      default_params:
        interval: 5min
        time_period: 20
        series_type: close
        nbdevup: 2
        nbdevdn: 2
    VWAP:
      cache_ttl: 60
      priority: 1
      default_params:
        interval: 5min
    ATR:
      cache_ttl: 300
      priority: 2
      default_params:
        interval: 5min
        time_period: 14
    ADX:
      cache_ttl: 300
      priority: 2
      default_params:
        interval: 5min
        time_period: 14
