ibkr:
  username: ${IBKR_USERNAME}
  password: ${IBKR_PASSWORD}
  account: ${IBKR_ACCOUNT}
  trading_mode: paper
  gateway_host: 127.0.0.1
  gateway_port: 7497
  client_id: 1
  connection_timeout: 30
  readonly: false
  reconnect_attempts: 3
  reconnect_delay: 5
  max_concurrent_subscriptions: 50
  data_feeds:
    quotes:
      enabled: true
      fields:
      - bid
      - ask
      - last
      - bid_size
      - ask_size
      - volume
    bars:
      enabled: true
      sizes:
      - 1 secs
      - 5 secs
      - 1 min
      - 5 mins
      - 15 mins
      - 30 mins
      - 1 hour
    moc_imbalance:
      enabled: true
      start_time: '15:40'
      end_time: '15:55'
