# IBKR Configuration
ibkr:
  host: ${IBKR_HOST}
  port: ${IBKR_PORT}
  client_id: ${IBKR_CLIENT_ID}
  
  # Connection settings
  connection:
    timeout: 30
    readonly: false  # Set to true for monitoring only
    account: ${IBKR_ACCOUNT}
    
  # Market data subscriptions
  market_data:
    max_subscriptions: 50
    subscription_tiers:
      tier_a: 20  # SPY, QQQ, IWM, SPX
      tier_b: 20  # MAG7 stocks
      tier_c: 10  # Rotating watchlist
    
  # Bar aggregation settings (5-sec to all timeframes)
  bar_aggregation:
    source_interval: 5  # seconds
    target_intervals:
      - 60    # 1 minute
      - 300   # 5 minutes
      - 600   # 10 minutes
      - 900   # 15 minutes
      - 1800  # 30 minutes
      - 3600  # 1 hour
    
  # Execution settings
  execution:
    order_timeout: 30
    fill_wait_time: 5
    use_adaptive: true
    clear_on_disconnect: true