database:
  host: ${DB_HOST}
  port: 5432
  name: ${DB_NAME}
  user: ${DB_USER}
  password: ${DB_PASSWORD}
  pool_size: 10
  max_overflow: 20
  pool_timeout: 30
  echo: false
  connection_timeout: 10
  command_timeout: 60
  options:
    sslmode: prefer
    connect_timeout: 10
migrations:
  auto_upgrade: false
  backup_before_migration: true
