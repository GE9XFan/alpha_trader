# Redis Cache Configuration
redis:
  host: ${REDIS_HOST}
  port: ${REDIS_PORT}
  db: ${REDIS_DB}
  password: ${REDIS_PASSWORD}
  
  # Connection settings
  socket_timeout: 5
  socket_connect_timeout: 5
  socket_keepalive: true
  socket_keepalive_options: {}
  
  # Pool settings
  connection_pool:
    max_connections: 50
    decode_responses: true
    encoding: "utf-8"
  
  # Default TTLs (seconds)
  default_ttl:
    realtime_options: 30
    indicators: 60
    historical_options: 86400
    fundamentals: 86400
    economic: 604800  # 7 days
  
  # Key prefixes
  key_prefixes:
    av: "av:"
    ibkr: "ibkr:"
    feature: "feat:"
    model: "ml:"
    signal: "sig:"