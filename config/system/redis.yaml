# Redis Cache Configuration
connection:
  host: localhost
  port: 6379
  db: 0
  decode_responses: true  # Return strings instead of bytes
  
pool:
  max_connections: 10
  
cache_ttl:
  # Critical data - short TTL
  realtime_options: 30     # 30 seconds for options with Greeks
  ibkr_quotes: 5          # 5 seconds for quotes
  
  # Less critical - longer TTL
  historical_options: 86400  # 24 hours (in seconds)
  api_responses: 300         # 5 minutes for general API responses
  
  # Static data
  symbol_info: 3600        # 1 hour for symbol metadata