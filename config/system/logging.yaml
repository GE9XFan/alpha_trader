# Logging Configuration
logging:
  # Log levels: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: ${LOG_LEVEL}
  
  # Console output
  console:
    enabled: true
    level: INFO
    colored: true
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    date_format: "%Y-%m-%d %H:%M:%S"
  
  # File output
  file:
    enabled: true
    level: DEBUG
    path: "logs"
    filename: "trading_system.log"
    max_bytes: 10485760  # 10MB
    backup_count: 10
    format: "%(asctime)s - %(name)s - %(levelname)s - [%(filename)s:%(lineno)d] - %(message)s"
    date_format: "%Y-%m-%d %H:%M:%S"
  
  # JSON output (for production)
  json:
    enabled: false
    level: INFO
    path: "logs"
    filename: "trading_system.json"
    max_bytes: 10485760  # 10MB
    backup_count: 10
  
  # Component-specific levels
  components:
    AlphaVantageClient: INFO
    IBKRConnection: INFO
    DataIngestion: INFO
    RateLimiter: INFO
    Scheduler: INFO
    DecisionEngine: INFO
    RiskManager: WARNING
    OrderManager: INFO
    DatabaseManager: INFO
    CacheManager: INFO