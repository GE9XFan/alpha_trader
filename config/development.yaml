# Development Configuration for AlphaTrader
# This configuration is for local development and testing

mode: development
environment: development

# IBKR Settings - Paper trading account
ibkr:
  account: ${IBKR_ACCOUNT}  # Will be loaded from environment
  host: 127.0.0.1
  live_port: 7496
  paper_port: 7497
  client_id: 1
  timeout: 30
  heartbeat_interval: 30
  max_reconnect_attempts: 5

# Alpha Vantage Settings
alpha_vantage:
  api_key: ${ALPHA_VANTAGE_KEY}  # Will be loaded from environment
  rate_limit: 500
  timeout: 30
  retry_count: 3
  critical_update_interval: 30
  standard_update_interval: 300

# Greeks Limits - Conservative for development
greeks_limits:
  delta_min: -0.3
  delta_max: 0.3
  gamma_min: -0.75
  gamma_max: 0.75
  vega_min: -1000.0
  vega_max: 1000.0
  theta_min: -500.0
  rho_min: -1000.0
  rho_max: 1000.0

# Risk Limits - Conservative for development
risk_limits:
  max_positions: 10  # Fewer positions in dev
  max_position_size: 10000.0  # Smaller positions in dev
  daily_loss_limit: 1000.0  # Lower loss limit in dev
  vpin_threshold: 0.7
  max_leverage: 1.5  # Lower leverage in dev
  stop_loss_percentage: 0.02

# Community Settings - Optional in development
community:
  discord_token: ${DISCORD_TOKEN}
  discord_webhook_url: ${DISCORD_WEBHOOK_URL}
  whop_api_key: ${WHOP_API_KEY}
  broadcast_delay_free: 300
  broadcast_delay_premium: 30
  broadcast_delay_vip: 0
  max_daily_signals_free: 5
  max_daily_signals_premium: 20
  max_daily_signals_vip: -1

# Trading Symbols - Subset for development
symbols:
  - SPY
  - QQQ
  - AAPL
  - MSFT
  - TSLA

# Database Configuration
database_url: postgresql://localhost/alphatrader_dev
redis_url: redis://localhost:6379/1

# Logging
log_level: DEBUG
log_dir: logs/dev

# Performance Settings
enable_profiling: true
enable_metrics: true
metrics_port: 8081