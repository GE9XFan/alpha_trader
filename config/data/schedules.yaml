# Data Collection Schedules
# Phase 1: Complete scheduling for all 35 Alpha Vantage APIs
schedules:
  # Symbol tiers
  tier_a_symbols: ['SPY', 'QQQ', 'IWM', 'SPX']
  tier_b_symbols: ['AAPL', 'MSFT', 'NVDA', 'GOOGL', 'AMZN', 'META', 'TSLA']
  tier_c_symbols: []  # Will be populated dynamically based on capacity
  
  # API groups with complete scheduling
  api_groups:
    # ==========================================
    # CRITICAL (1 API) - Highest Priority
    # ==========================================
    critical:
      apis: ['realtime_options']
      tier_a_interval: 30   # Every 30 seconds
      tier_b_interval: 45   # Every 45 seconds  
      tier_c_interval: 180  # Every 3 minutes
      calls_per_symbol: 1
      
    # ==========================================
    # FAST INDICATORS (7 APIs) - High Priority
    # ==========================================
    indicators_fast:
      apis: ['rsi', 'macd', 'stoch', 'willr', 'mom', 'bbands', 'vwap']
      tier_a_interval: 60   # Every 1 minute
      tier_b_interval: 300  # Every 5 minutes
      tier_c_interval: 600  # Every 10 minutes
      calls_per_symbol: 7   # 7 indicators per symbol
      
    # ==========================================
    # MEDIUM INDICATORS (9 APIs) - Medium Priority
    # ==========================================
    indicators_medium:
      apis: ['atr', 'adx', 'aroon', 'cci', 'ema', 'sma', 'mfi', 'obv', 'ad']
      tier_a_interval: 300  # Every 5 minutes
      tier_b_interval: 600  # Every 10 minutes
      tier_c_interval: 1200 # Every 20 minutes
      calls_per_symbol: 9   # 9 indicators per symbol
      
    # ==========================================
    # ANALYTICS (2 APIs) - Medium Priority
    # ==========================================
    analytics:
      apis: ['analytics_fixed_window', 'analytics_sliding_window']
      tier_a_interval: 300  # Every 5 minutes
      tier_b_interval: 900  # Every 15 minutes
      tier_c_interval: 1800 # Every 30 minutes
      calls_per_symbol: 2   # 2 analytics per symbol
      
    # ==========================================
    # SENTIMENT & NEWS (3 APIs) - Low Priority
    # ==========================================
    sentiment:
      apis: ['news_sentiment', 'top_gainers_losers', 'insider_transactions']
      tier_a_interval: 600  # Every 10 minutes
      tier_b_interval: 1200 # Every 20 minutes
      tier_c_interval: 3600 # Every 60 minutes
      calls_per_symbol: 2   # news_sentiment + insider_transactions per symbol
      calls_global: 1       # top_gainers_losers is global (no symbol)
      
    # ==========================================
    # FUNDAMENTALS (7 APIs) - Daily Updates
    # ==========================================
    fundamentals:
      apis: ['overview', 'income_statement', 'balance_sheet', 'cash_flow', 'dividends', 'splits']
      schedule_type: 'daily'
      run_time: '06:00'     # 6 AM ET before market open
      calls_per_symbol: 6   # 6 fundamental APIs per symbol
      calls_global: 1       # earnings_calendar is global
      
    # ==========================================
    # ECONOMIC INDICATORS (5 APIs) - Weekly Updates
    # ==========================================
    economic:
      apis: ['treasury_yield', 'federal_funds_rate', 'cpi', 'inflation', 'real_gdp']
      schedule_type: 'weekly'
      run_day: 'sunday'     # Sunday updates
      run_time: '05:00'     # 5 AM ET
      calls_total: 5        # All economic indicators are global
      
    # ==========================================
    # DAILY HISTORICAL (1 API) - Once Daily
    # ==========================================
    daily:
      apis: ['historical_options']
      schedule_type: 'daily'
      run_time: '05:30'     # 5:30 AM ET before market open
      calls_per_symbol: 1   # Historical options per symbol
  
  # ==========================================
  # Rate Limit Allocation
  # ==========================================
  rate_allocation:
    # Total budget: 500 calls/minute target (600 max)
    critical: 120         # 24% - realtime_options priority
    indicators_fast: 200  # 40% - core trading indicators
    indicators_medium: 135 # 27% - supporting indicators
    analytics: 25         # 5% - statistical analysis
    sentiment: 20         # 4% - market sentiment
    # Daily/weekly APIs don't count against minute limits
    
  # ==========================================
  # Trading Hours Configuration
  # ==========================================
  trading_hours:
    market_open: '09:30'
    market_close: '16:00'
    timezone: 'America/New_York'
    # Pre-market collection starts at 06:00
    # Post-market collection until 20:00
    
  # ==========================================
  # Special Scheduling Rules
  # ==========================================
  special_rules:
    # VWAP is intraday only (15min intervals)
    vwap:
      active_hours: '09:30-16:00'
      weekend_skip: true
      
    # Economic indicators only on business days
    economic_indicators:
      weekends_skip: true
      holidays_skip: true
      
    # Options data priority during market hours
    options_priority:
      market_hours_boost: true
      after_hours_reduce: 0.5  # Half frequency after hours