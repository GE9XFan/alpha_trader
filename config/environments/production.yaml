environment:
  name: production
  debug: false
  testing: false
  overrides:
    apis:
      ibkr:
        trading_mode: live
    risk:
      circuit_breakers:
        daily_loss:
          threshold: 0.02
          action: emergency_shutdown
    logging:
      level: WARNING
    data:
      validation:
        strict_mode: true
    monitoring:
      alerts:
        channels:
          discord:
            enabled: true
          email:
            enabled: true
