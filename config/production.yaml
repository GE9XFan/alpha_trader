# Production Configuration for AlphaTrader
# CRITICAL: This configuration is for live trading with real money

mode: production
environment: production

# IBKR Settings - Live trading account
ibkr:
  account: ${IBKR_ACCOUNT}  # Will be loaded from environment
  host: 127.0.0.1
  live_port: 7496  # Live port
  paper_port: 7497  # Not used in production
  client_id: 1
  timeout: 30
  heartbeat_interval: 30
  max_reconnect_attempts: 5

# Alpha Vantage Settings
alpha_vantage:
  api_key: ${ALPHA_VANTAGE_KEY}  # Will be loaded from environment
  rate_limit: 500
  timeout: 30
  retry_count: 3
  critical_update_interval: 30
  standard_update_interval: 300

# Greeks Limits - Production limits
greeks_limits:
  delta_min: -0.3
  delta_max: 0.3
  gamma_min: -0.75
  gamma_max: 0.75
  vega_min: -1000.0
  vega_max: 1000.0
  theta_min: -500.0
  rho_min: -1000.0
  rho_max: 1000.0

# Risk Limits - Production limits
risk_limits:
  max_positions: 20
  max_position_size: 50000.0
  daily_loss_limit: 10000.0
  vpin_threshold: 0.7
  max_leverage: 2.0
  stop_loss_percentage: 0.02

# Community Settings - Full production
community:
  discord_token: ${DISCORD_TOKEN}
  discord_webhook_url: ${DISCORD_WEBHOOK_URL}
  whop_api_key: ${WHOP_API_KEY}
  broadcast_delay_free: 300
  broadcast_delay_premium: 30
  broadcast_delay_vip: 0
  max_daily_signals_free: 5
  max_daily_signals_premium: 20
  max_daily_signals_vip: -1

# Trading Symbols - Full list for production
symbols:
  # ETFs
  - SPY
  - QQQ
  - IWM
  - DIA
  - VTI
  # MAG7
  - AAPL
  - MSFT
  - GOOGL
  - AMZN
  - NVDA
  - META
  - TSLA
  # Additional high-volume
  - AMD
  - INTC
  - NFLX
  - BABA
  - JNJ
  - V
  - MA
  # User specified
  - PLTR
  - DIS
  - HMNS

# Database Configuration - Production database
database_url: ${DATABASE_URL}  # Should point to production PostgreSQL
redis_url: ${REDIS_URL}  # Should point to production Redis

# Logging
log_level: INFO
log_dir: logs/prod

# Performance Settings
enable_profiling: false  # Disabled in production for performance
enable_metrics: true
metrics_port: 8080