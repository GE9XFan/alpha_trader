# config/analytics/analytics_engine.yaml
# Analytics Engine configuration - Phase 6.2

calculations:
  # Ratios and derived metrics
  put_call_ratios:
    volume_based: true
    open_interest_based: true
    premium_based: true
  
  # Aggregations
  aggregations:
    by_strike: true
    by_expiration: true
    by_moneyness: true
  
  # Moneyness buckets
  moneyness_buckets:
    deep_itm: 0.20    # Delta > 0.80
    itm: 0.10         # Delta 0.60-0.80
    atm: 0.05         # Delta 0.40-0.60
    otm: 0.10         # Delta 0.20-0.40
    deep_otm: 0.20    # Delta < 0.20
  
  # Skew calculation parameters
  skew_calculation:
    put_delta_min: -0.30
    put_delta_max: -0.20
    call_delta_min: 0.20
    call_delta_max: 0.30
  
  # Term structure parameters
  term_structure:
    short_term_days: 30
    historical_days: 30
  
  # Statistical measures
  statistics:
    calculate_skew: true
    calculate_term_structure: true
    calculate_smile: true
    calculate_gex: true  # Gamma exposure
  
  # ATM definition
  atm_definition:
    delta_threshold: 0.1  # Consider ATM if abs(delta - 0.5) < threshold
  
# Thresholds for signals
signal_thresholds:
  high_gamma_exposure: 1000000  # $1M GEX
  unusual_volume: 2.0  # 2x average
  high_iv_percentile: 80
  low_iv_percentile: 20
  high_put_call_ratio: 1.2
  low_put_call_ratio: 0.7
  
# Time windows for analysis
time_windows:
  intraday: 390  # minutes in trading day
  daily: 1440    # minutes in day
  weekly: 7200   # minutes in 5 trading days
  
# Weights for composite scores
indicator_weights:
  rsi: 0.15
  macd: 0.15
  bbands: 0.10
  vwap: 0.10
  volume: 0.20
  greeks: 0.30

# Scoring parameters
scoring:
  rsi:
    oversold_threshold: 30
    overbought_threshold: 70
    neutral_value: 50
  macd:
    histogram_scale: 10
    max_deviation: 50
  bbands:
    use_position: true