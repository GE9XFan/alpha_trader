# Redis Configuration for Options Trading System
# Phase 1: Core Infrastructure
# Optimized for low-latency trading with 4GB memory limit

# Network
bind 127.0.0.1
protected-mode yes
port 6379
tcp-backlog 511
tcp-keepalive 300
timeout 0

# Memory Management
# 4GB limit as per spec (~400MB per symbol, 10 symbols max)
maxmemory 4gb
maxmemory-policy volatile-lru

# Persistence (Optional - can disable for pure cache)
# Commenting out for maximum performance
# save 900 1
# save 300 10
# save 60 10000
save ""
stop-writes-on-bgsave-error no
rdbcompression no
rdbchecksum no
dbfilename dump.rdb
dir ./

# Append-only file (Disable for pure cache performance)
appendonly no
appendfilename "appendonly.aof"
appendfsync no
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 0
auto-aof-rewrite-min-size 64mb

# Logging
loglevel notice
logfile ""
syslog-enabled no

# Performance Tuning
databases 1
hz 100
dynamic-hz yes

# Advanced config
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000
stream-node-max-bytes 4096
stream-node-max-entries 100
activerehashing yes
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Latency monitoring
latency-monitor-threshold 10

# Event notification (for cache invalidation)
notify-keyspace-events "Ex"

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Client connection limits
maxclients 10000

# Threading (Redis 7.0+)
# Enable I/O threading for better performance
io-threads 4
io-threads-do-reads yes

# Additional optimizations for trading
# Disable RDB checksumming for speed
rdb-save-incremental-fsync no

# Optimize for low latency
# Prefer latency over throughput
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes

# Memory optimization
jemalloc-bg-thread yes

# Optimize TCP settings for low latency
tcp-nodelay yes