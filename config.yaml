# AlphaTrader Configuration File - UPDATED VERSION
# Single source of truth for all system configuration
# Updated with 600 calls/min for Alpha Vantage Premium

# Core trading settings
mode: paper  # paper or live
symbols: 
  - SPY
  - QQQ
  - IWM

# Interactive Brokers configuration
ibkr:
  host: 127.0.0.1
  paper_port: 7497
  live_port: 7496
  client_id: 1
  timeout: 30

# Alpha Vantage configuration - UPDATED WITH PREMIUM LIMITS
alpha_vantage:
  api_key: ${ALPHA_VANTAGE_API_KEY}  # Set in environment variable
  rate_limit: 600  # UPDATED: 600 for premium (was 75)
  daily_limit: 864000  # 600/min * 60 * 24
  reserve_calls: 10000  # Keep 10k calls in reserve
  
  # Differentiated cache TTLs by API type
  cache_ttls:
    options: 60          # 1 minute for options
    technical: 300       # 5 minutes for indicators
    sentiment: 900       # 15 minutes for news
    fundamentals: 86400  # 1 day for fundamentals
    economic: 604800     # 1 week for economic data
    analytics: 3600      # 1 hour for analytics
  
  timeout: 30
  retry_count: 3
  use_cache: true
  
  # Feature flags for different APIs
  use_realtime_options: true
  use_technical_indicators: true  # Use AV instead of TA-Lib
  use_sentiment_data: true
  use_fundamental_data: true
  use_economic_data: true
  use_analytics: true

# Risk management - ENHANCED
risk:
  # Position limits
  max_positions: 5
  max_position_size: 10000.0
  daily_loss_limit: 1000.0
  
  # Greeks limits (portfolio level)
  greeks_limits:
    delta: [-0.3, 0.3]
    gamma: [-0.5, 0.5]
    vega: [-500, 500]
    theta: [-200, null]
  
  # Trade settings
  max_contracts_per_trade: 5
  min_time_between_signals: 300
  position_stop_loss_pct: 0.20
  trailing_stop_pct: 0.15
  
  # Fundamental risk limits - NEW
  block_trades_before_earnings_days: 2
  min_company_market_cap: 1000000000  # $1B minimum
  max_debt_to_equity: 2.0
  
  # Sentiment risk limits - NEW
  min_sentiment_score: -0.5
  max_negative_news_count: 5

# Machine Learning - ENHANCED
ml:
  model_path: models/xgboost_v1.pkl
  scaler_path: models/xgboost_v1_scaler.pkl
  min_confidence: 0.6
  retrain_interval_days: 7
  lookback_days: 30
  feature_count: 34  # UPDATED: Increased with sentiment/fundamental features
  
  # Model parameters
  n_estimators: 100
  max_depth: 5
  learning_rate: 0.1
  n_classes: 4
  
  # Feature sources - NEW
  use_av_technical_indicators: true  # Use AV instead of TA-Lib
  use_sentiment_features: true       # Include news sentiment
  use_fundamental_features: true     # Include fundamental data

# Database
database:
  postgres_host: localhost
  postgres_port: 5432
  postgres_db: alphatrader
  postgres_user: postgres
  # postgres_password set via POSTGRES_PASSWORD env var
  
  redis_host: localhost
  redis_port: 6379
  redis_db: 0
  
  min_connections: 1
  max_connections: 20
  
  # Data retention
  trade_retention_days: 365
  tick_data_retention_days: 30

# Execution
execution:
  slippage_ticks: 1
  market_order_timeout: 10
  use_adaptive_orders: false
  market_open_delay_seconds: 60
  market_close_cutoff_seconds: 60
  auto_close_0dte: true
  close_0dte_time: "15:59:00"
  
  # Position sizing - NEW
  use_kelly_criterion: false
  max_kelly_fraction: 0.25

# Market Regime Detection - NEW
market_regime:
  # Regime thresholds
  vix_high_threshold: 30.0
  vix_low_threshold: 15.0
  
  # Sentiment thresholds
  bullish_sentiment_threshold: 0.6
  bearish_sentiment_threshold: -0.6
  
  # Trend detection
  trend_lookback_days: 20
  strong_trend_threshold: 0.02
  
  # Regime-based position adjustments
  volatility_adjustments:
    HIGH_VOL: 0.5     # Reduce by 50%
    NORMAL: 1.0       # Normal size
    LOW_VOL: 1.2      # Increase by 20%

# Monitoring - NEW
monitoring:
  enable_metrics: true
  metrics_port: 8080
  
  # Performance thresholds
  max_latency_ms: 200
  max_error_rate: 0.01
  min_cache_hit_rate: 0.80
  
  # Health checks
  health_check_interval: 60
  api_health_check_interval: 300
  
  # Alerting
  enable_discord_alerts: true
  alert_webhook_url: ${DISCORD_WEBHOOK_URL}
  
  # Dashboard
  enable_dashboard: true
  dashboard_refresh_rate: 5

# System settings
log_level: INFO
log_file: logs/alphatrader.log
log_rotation: daily
log_retention_days: 30

# Timezone and market hours
timezone: America/New_York
market_open: "09:30:00"
market_close: "16:00:00"

# Feature flags
enable_paper_trading: true
enable_live_trading: false
enable_backtesting: true
enable_discord_bot: false
enable_web_dashboard: false

# Performance settings
use_multiprocessing: true
max_workers: 4

# Discord Community Platform (Phase 2+)
discord:
  bot_token: ${DISCORD_BOT_TOKEN}
  
  # Channel IDs
  signals_channel: 1234567890  # Replace with actual ID
  performance_channel: 1234567891
  alerts_channel: 1234567892
  
  # Signal publishing
  publish_paper_trades: true
  publish_live_trades: false
  
  # Tier delays (seconds)
  tier_delays:
    free: 300     # 5 minutes
    premium: 30   # 30 seconds
    vip: 0        # Instant
  
  # Subscription limits
  tier_limits:
    free:
      max_signals_per_day: 5
      max_positions: 3
    premium:
      max_signals_per_day: 20
      max_positions: 10
    vip:
      max_signals_per_day: -1  # Unlimited
      max_positions: -1

# Backtesting settings
backtesting:
  initial_capital: 100000
  commission_per_contract: 0.65
  slippage_ticks: 2
  use_historical_iv: true
  include_sentiment: true

# API Health Check Settings - NEW
health_check:
  critical_endpoints:  # Must be working for trading
    - REALTIME_OPTIONS
    - RSI
    - NEWS_SENTIMENT
    - OVERVIEW
  
  warmup_endpoints:  # Pre-cache these at startup
    - REALTIME_OPTIONS
    - RSI
    - MACD
    - BBANDS
    - NEWS_SENTIMENT
    - OVERVIEW
  
  check_interval_minutes: 60
  alert_on_failure: true